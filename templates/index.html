<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Subscriptions Manager</title>
    <!-- Modern Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
            background: linear-gradient(90deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--bg);
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        button {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .btn-notify {
            width: 100%;
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            color: white;
            margin-top: 10px;
        }

        .btn-notify:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        }

        .status {
            text-align: center;
            min-height: 24px;
            font-size: 0.9rem;
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
            transition: all 0.3s ease;
        }

        .success {
            display: block;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* Micro-animations */
        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Stay Connected</h1>
        <p class="subtitle">Enter your email to manage your subscription</p>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="example@gmail.com" required>
        </div>

        <div class="btn-group">
            <button class="btn-primary" onclick="handleAction('subscribe')">Subscribe</button>
            <button class="btn-secondary" onclick="handleAction('unsubscribe')">Unsubscribe</button>
        </div>

        <div style="border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 24px;">
            <p style="font-size: 0.85rem; color: var(--text-secondary); text-align: center; margin-bottom: 12px;">Admin Simulation</p>
            <button class="btn-notify" onclick="handleAction('notify')">Send Bulk Notifications</button>
        </div>

        <div id="status" class="status"></div>

        <footer>
            &copy; 2026 Subscription Manager. All rights reserved.
        </footer>
    </div>

    <script>
        async function handleAction(action) {
            const email = document.getElementById('email').value;
            const statusDiv = document.getElementById('status');
            statusDiv.style.display = 'none';

            if (action !== 'notify' && !email) {
                showStatus("Please enter your email first", "error");
                return;
            }

            try {
                const response = await fetch(`/${action}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                const data = await response.json();

                if (response.ok) {
                    showStatus(data.message, "success");
                    if (action === 'notify') {
                        console.log("Recipients:", data.recipients);
                    }
                } else {
                    showStatus(data.message, "error");
                }
            } catch (err) {
                showStatus("Connection error. Is the server running?", "error");
            }
        }

        function showStatus(text, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = text;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
        }
    </script>
</body>
</html>
